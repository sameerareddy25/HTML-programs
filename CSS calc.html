<html>
<head>
    <style>
        .box{
            width: calc(1px*pow(10, 2)*sqrt(4)*sin(90));
            height: 100px;
            background: steelblue;
            color: white;
            text-align: center;
            line-height: 50px;
        }
        </style>
        </head>
        <body>
            <h3>calc() Function</h3>
            <div class="box">Width</div>
        </body>
</html>
