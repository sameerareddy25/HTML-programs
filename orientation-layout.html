<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                text-align: center;
                font-size: 24px;
                padding-top: 40px;
            }
            /* Portrait mode */
@media (orientation: portrait){
    body{
        background-color: lightblue;

    }
    h1:after{
        content: " -Portrait Mode";
    }
}
/*LandScape Mode */
@media (orientation: landscape){
    body{
        background-color: lightgray;
    }
    h1:after{
        content: " -Landscape Mode";
    }
}
</style>
</head>
</html>
